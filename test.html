<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>Camera Stream via Proxy</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <h2>Live Camera</h2>

  <video id="video" width="700" controls autoplay muted playsinline></video>

  <script>
    const video = document.getElementById("video");

    // هذا صار يشير إلى سيرفرك أنت
    const videoSrc = "http://localhost:3000/proxy/m3u8";

    console.log("Proxy video source:", videoSrc);

    if (Hls.isSupported()) {
      const hls = new Hls({ debug: true });
      hls.loadSource(videoSrc);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play().catch(err => console.log("Play error:", err));
      });

      hls.on(Hls.Events.ERROR, function (event, data) {
        console.error("HLS error:", data);
      });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = videoSrc;
      video.addEventListener("loadedmetadata", function () {
        video.play().catch(err => console.log("Native play error:", err));
      });
    } else {
      console.error("HLS not supported in this browser");
    }
  </script>
</body>
</html>
