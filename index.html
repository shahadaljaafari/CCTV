<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Causeway Monitoring Wall</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --line: #e6ece8;
      --text: #1f2933;
      --muted: #6b7c72;
      --success: #4b8f3b;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      --radius-xl: 20px;
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }

    .shell {
      width: 1900px;
      height: 1200px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 20px;
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr;
    }

    .brand,
    .summary-card,
    .camera-card {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .brand {
      border-radius: var(--radius-xl);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 92px;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .logo-badge {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: #f4f7f5;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      font-size: 22px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #f6faf7;
      border: 1px solid #dfece3;
      color: #2f5d35;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 0 rgba(75, 143, 59, 0.75);
      animation: pulse 2s infinite;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .summary-card {
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      min-height: 86px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .summary-value {
      margin-top: 10px;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text);
    }

    .summary-sub {
      margin-top: 6px;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .clock {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
    }

    .wall {
      min-height: 0;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .camera-card {
      min-width: 0;
      min-height: 0;
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .camera-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .camera-title-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .camera-icon {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: #f4f7f5;
      border: 1px solid var(--line);
      font-size: 18px;
      flex: 0 0 auto;
    }

    .camera-title {
      min-width: 0;
    }

    .camera-title h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 650;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .camera-title span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.83rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .camera-badges {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 0.76rem;
      border: 1px solid var(--line);
      background: #f7f8f9;
      color: #415064;
      white-space: nowrap;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .player-wrap {
      position: relative;
      min-height: 0;
      background: #000000;
    }

    .player-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0) 70%, rgba(0, 0, 0, 0.38) 100%);
      pointer-events: none;
      z-index: 1;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000000;
      display: block;
    }

    .camera-footer {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .footer-panel {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      color: #ffffff;
      font-size: 0.8rem;
    }

    .signal-bars {
      display: inline-flex;
      align-items: flex-end;
      gap: 3px;
      height: 14px;
    }

    .signal-bars i {
      display: block;
      width: 4px;
      border-radius: 3px;
      background: linear-gradient(180deg, #a9d99c, #4b8f3b);
    }

    .signal-bars i:nth-child(1) { height: 4px; }
    .signal-bars i:nth-child(2) { height: 7px; }
    .signal-bars i:nth-child(3) { height: 10px; }
    .signal-bars i:nth-child(4) { height: 14px; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(75, 143, 59, 0.75); }
      70% { box-shadow: 0 0 0 10px rgba(75, 143, 59, 0); }
      100% { box-shadow: 0 0 0 0 rgba(75, 143, 59, 0); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <div class="brand-left">
          <div class="logo-badge">🎛️</div>
          <div>
            <h1>Causeway Live Monitoring Center</h1>
            <p>Real-time border flow streams for Saudi and Bahrain lanes</p>
          </div>
        </div>
        <div class="live-pill">
          <span class="live-dot"></span>
          <span>Live Monitoring</span>
        </div>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">Active Streams</div>
        <div class="summary-value">4 / 4</div>
        <div class="summary-sub">All channels connected</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Saudi Side</div>
        <div class="summary-value">2 Feeds</div>
        <div class="summary-sub">Arrival and departure</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Bahrain Side</div>
        <div class="summary-value">2 Feeds</div>
        <div class="summary-sub">Arrival and departure</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Display Mode</div>
        <div class="summary-value">Video Wall</div>
        <div class="summary-sub clock" id="clock">--:--:--</div>
      </div>
    </div>

    <div class="wall" id="wall"></div>
  </div>

  <script>
    const streams = [
      {
        id: 1,
        name: 'Saudi Arrival',
        sub: 'Inbound traffic lane',
        icon: '🇸🇦',
        zone: 'Saudi',
        mode: 'Arrival',
        url: 'https://addy.gooick.com/sa/main/output.m3u8?signature=4a335e7ca723824049947ce7951cfe938602840fb30a7498c017dd0811ae6176&t=1773138978&no_ad=true'
      },
      {
        id: 2,
        name: 'Saudi Departure',
        sub: 'Outbound traffic lane',
        icon: '🇸🇦',
        zone: 'Saudi',
        mode: 'Departure',
        url: 'https://addy.gooick.com/sd/main/output.m3u8?signature=058c2a97d60881e0cde5332ce1d7fe318df7e5d5dca59c55846fbb45e3d599c2&t=1773138978&no_ad=true'
      },
      {
        id: 3,
        name: 'Bahrain Arrival',
        sub: 'Inbound traffic lane',
        icon: '🇧🇭',
        zone: 'Bahrain',
        mode: 'Arrival',
        url: 'https://addy.gooick.com/ba/main/output.m3u8?signature=766c107e11766855175407f1bea7849ed39408c2e3eb012a45aec224bc171bda&t=1773138978&no_ad=true'
      },
      {
        id: 4,
        name: 'Bahrain Departure',
        sub: 'Outbound traffic lane',
        icon: '🇧🇭',
        zone: 'Bahrain',
        mode: 'Departure',
        url: 'https://addy.gooick.com/bd/main/output.m3u8?signature=e76836599d7dee83b1a12071facd84dbedc8abfc9b1cbe6e9baeb2b02a4d4316&t=1773138978&no_ad=true'
      }
    ];

    const wall = document.getElementById('wall');

    function buildCards() {
      wall.innerHTML = '';

      streams.forEach((stream) => {
        const card = document.createElement('section');
        card.className = 'camera-card';
        card.innerHTML = `
          <div class="camera-head">
            <div class="camera-title-wrap">
              <div class="camera-icon">${stream.icon}</div>
              <div class="camera-title">
                <h2>${stream.name}</h2>
                <span>${stream.sub}</span>
              </div>
            </div>
            <div class="camera-badges">
              <span class="badge"><span class="badge-dot"></span>LIVE</span>
              <span class="badge">${stream.zone}</span>
              <span class="badge">${stream.mode}</span>
            </div>
          </div>
          <div class="player-wrap">
            <video id="video-${stream.id}" autoplay muted playsinline controls></video>
            <div class="camera-footer">
              <div class="footer-panel">
                <span class="signal-bars"><i></i><i></i><i></i><i></i></span>
                <span>Stable signal</span>
              </div>
              <div class="footer-panel">${stream.name}</div>
            </div>
          </div>
        `;
        wall.appendChild(card);
      });
    }

    function loadStream(videoId, url) {
      const video = document.getElementById(videoId);
      if (!video) return;

      if (Hls.isSupported()) {
        const hls = new Hls({
          enableWorker: true,
          lowLatencyMode: true,
          backBufferLength: 90,
        });
        hls.loadSource(url);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
      }
    }

    function updateClock() {
      const el = document.getElementById('clock');
      const now = new Date();
      el.textContent = now.toLocaleTimeString([], { hour12: false });
    }

    buildCards();
    streams.forEach((stream) => loadStream(`video-${stream.id}`, stream.url));
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
